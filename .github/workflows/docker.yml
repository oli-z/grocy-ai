name: CI/CD Pipeline (Build, Push & Release)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (für ARM/Raspberry Pi)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Docker tags
        id: meta
        run: |
          REGISTRY="ghcr.io/${{ github.repository }}"
          # GHCR verlangt zwingend Kleinschreibung für Image-Namen
          REGISTRY=$(echo "$REGISTRY" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "tags=${REGISTRY}:${VERSION},${REGISTRY}:latest" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=${REGISTRY}:latest" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "tags=${REGISTRY}:dev" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Create GitHub Release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Update HA Addon Repository
        if: steps.meta.outputs.is_release == 'true'
        run: |
          git clone https://x-access-token:${{ secrets.HA_REPO_TOKEN }}@github.com/oli-z/homeassistant-apps.git ha-repo
          cd ha-repo
          
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/^version: .*/version: \"$VERSION\"/" grocy-ai/config.yaml
          
          echo "## Version $VERSION" > temp_changelog.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline --pretty=format:"* %s" >> temp_changelog.md
          echo -e "\n" >> temp_changelog.md
          
          if [ -f grocy-ai/CHANGELOG.md ]; then
            cat grocy-ai/CHANGELOG.md >> temp_changelog.md
          fi
          mv temp_changelog.md grocy-ai/CHANGELOG.md
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "bump: grocy-ai to v$VERSION"
          git push origin main