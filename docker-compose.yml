version: '3.8'

services:
  grocy-ai:
    build: .
    container_name: grocy_ai
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - AI_MODEL=${AI_MODEL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROCY_API_KEY=${GROCY_API_KEY}
      - GROCY_URL=${GROCY_URL}
      - GROCY_PORT=${GROCY_PORT}
    restart: unless-stopped